# Release: build forseti + forseti-gui (-o:speed via the Makefile) for
# macOS arm64 and Linux x64/arm64, run the full test suite, and attach the
# tarballs + SHA256SUMS to a GitHub Release.
#
# Triggers on version tags (v*). workflow_dispatch runs the same builds and
# uploads workflow artifacts without publishing a release (dry run).
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  # Pinned Odin toolchain (prebuilt release binaries exist for all three targets).
  ODIN_RELEASE: dev-2026-06

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: macos-arm64
            odin_asset: macos-arm64
          - os: ubuntu-24.04
            target: linux-x64
            odin_asset: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            odin_asset: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out (with submodules)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          # Hosted runners preinstall a Microsoft/Azure apt repo that
          # intermittently serves an unsigned InRelease, which fails the whole
          # `apt-get update` (exit 100) even though the Ubuntu repos we need are
          # fine. We don't use it — remove it before updating.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* \
            /etc/apt/sources.list.d/*azure* 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool libncurses-dev \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool

      - name: Install Odin (prebuilt ${{ env.ODIN_RELEASE }})
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$ODIN_RELEASE" --repo odin-lang/Odin \
            --pattern "odin-${{ matrix.odin_asset }}-*" --dir "$RUNNER_TEMP"
          mkdir -p "$HOME/odin"
          tar -xzf "$RUNNER_TEMP"/odin-${{ matrix.odin_asset }}-*.tar.gz -C "$HOME/odin"
          # Archive layout has varied across releases — locate the binary.
          ODIN_BIN="$(find "$HOME/odin" -maxdepth 3 -name odin -type f | head -1)"
          chmod +x "$ODIN_BIN"
          dirname "$ODIN_BIN" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: odin version

      # Odin's vendored raylib ships x64-only Linux static libs; build
      # arm64 ones from source (raylib 5.5 + raygui 4.0 — the exact
      # versions the vendor bindings target) and drop them into the
      # toolchain's vendor dir, which the bindings reference by path.
      - name: Build arm64 raylib/raygui vendor libs
        if: matrix.target == 'linux-arm64'
        run: |
          VENDOR="$(odin root)/vendor/raylib/linux"
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib "$RUNNER_TEMP/raylib"
          make -C "$RUNNER_TEMP/raylib/src" PLATFORM=PLATFORM_DESKTOP -j"$(nproc)"
          cp "$RUNNER_TEMP/raylib/src/libraylib.a" "$VENDOR/libraylib.a"
          git clone --depth 1 --branch 4.0 https://github.com/raysan5/raygui "$RUNNER_TEMP/raygui"
          printf '#define RAYGUI_IMPLEMENTATION\n#include "raygui.h"\n' > "$RUNNER_TEMP/raygui/src/raygui.c"
          cc -c -O2 -I"$RUNNER_TEMP/raylib/src" -o "$RUNNER_TEMP/raygui.o" "$RUNNER_TEMP/raygui/src/raygui.c"
          ar rcs "$VENDOR/libraygui.a" "$RUNNER_TEMP/raygui.o"

      - name: Build (deps + node + dashboard client)
        env:
          MACOS_MIN: "13.0" # portable minos for release binaries
        run: |
          make deps
          make build
          make gui

      - name: Run test suite
        run: make test

      - name: Smoke test binaries
        run: |
          ./forseti --help > /dev/null
          ./forseti-gui --help > /dev/null
          echo "smoke OK"

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            VERSION="$(git rev-parse --short HEAD)"
          fi
          NAME="forseti-${VERSION}-${{ matrix.target }}"
          mkdir "$NAME"
          cp forseti forseti-gui README.md LICENSE "$NAME/"
          cp -R docs "$NAME/docs"
          tar -czf "$NAME.tar.gz" "$NAME"
          ls -la "$NAME.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: forseti-${{ matrix.target }}
          path: forseti-*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum forseti-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/forseti-*.tar.gz dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --title "forseti $GITHUB_REF_NAME" \
            --generate-notes
